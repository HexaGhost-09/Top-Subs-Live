<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top Creators</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      padding: 40px 16px 60px;
    }

    .page-title {
      text-align: center;
      font-size: 2.2rem;
      font-weight: 800;
      color: #1a1a2e;
      margin-bottom: 36px;
      letter-spacing: -0.5px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      max-width: 960px;
      margin: 0 auto;
    }

    @media (max-width: 768px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
      .cta-card { grid-column: span 2; }
    }

    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr; }
      .cta-card { grid-column: span 1; }
    }

    /* ── Creator Card ── */
    .card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.12);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .rank-badge {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #1a1a2e;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .rank-badge.gold   { background: linear-gradient(135deg, #f7971e, #ffd200); color: #1a1a2e; }
    .rank-badge.silver { background: linear-gradient(135deg, #bdc3c7, #95a5a6); color: #fff; }
    .rank-badge.bronze { background: linear-gradient(135deg, #cd6133, #e17055); color: #fff; }

    .card-label {
      font-size: 0.78rem;
      color: #9b9b9b;
      font-weight: 500;
    }

    /* KEY FIX: tall enough iframe so livecounts widget shows fully */
    .card iframe {
      width: 100%;
      height: 140px;          /* ← was 80px, now 140px */
      border-radius: 12px;
      border: 1px solid #e8e8e8;
      display: block;
    }

    /* ── Empty slot ── */
    .empty-slot {
      border: 2px dashed #ccc;
      border-radius: 18px;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      text-align: center;
      gap: 8px;
      min-height: 180px;
      transition: background 0.2s;
    }
    .empty-slot:hover { background: #f0f0f0; }

    .empty-rank {
      width: 36px; height: 36px; border-radius: 50%;
      background: #ddd; color: #666;
      font-size: 0.75rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }

    .empty-slot h3 { font-size: 1rem; font-weight: 700; color: #555; }
    .empty-slot p  { font-size: 0.8rem; color: #999; }

    /* ── CTA banner ── */
    .cta-card {
      grid-column: span 3;
      background: linear-gradient(135deg, #ff6b6b, #ee5a24);
      border-radius: 20px;
      padding: 28px 24px;
      text-align: center;
      color: #fff;
      box-shadow: 0 4px 20px rgba(238, 90, 36, 0.35);
    }

    .cta-card h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: 8px; }
    .cta-card p  { font-size: 0.95rem; opacity: 0.92; }
    .cta-card .sub-text { margin-top: 4px; font-size: 0.85rem; opacity: 0.78; }

    .btn-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .btn {
      padding: 9px 22px;
      border-radius: 999px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: transform 0.15s, filter 0.15s;
    }
    .btn:hover { transform: scale(1.05); filter: brightness(1.08); }

    .btn-sub  { background: #c0392b; color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.25); }
    .btn-like { background: #fff; color: #1a1a2e; }
    .btn-cmt  { background: #fff; color: #1a1a2e; }
  </style>
</head>
<body>

  <h1 class="page-title">🌟 Top Creators</h1>

  <div class="grid">

    <!-- #1 MrBeast -->
    <div class="card">
      <div class="card-header">
        <div class="rank-badge gold">#1</div>
        <span class="card-label">Live counter</span>
      </div>
      <iframe loading="lazy" frameborder="0"
        src="https://livecounts.io/embed/youtube-live-subscriber-counter/UCX6OQ3DkcsbYNE6H8uQQuVA"></iframe>
    </div>

    <!-- #2 T-Series -->
    <div class="card">
      <div class="card-header">
        <div class="rank-badge silver">#2</div>
        <span class="card-label">Live counter</span>
      </div>
      <iframe loading="lazy" frameborder="0"
        src="https://livecounts.io/embed/youtube-live-subscriber-counter/UCq-Fj5jknLsUf-MWSy4_brA"></iframe>
    </div>

    <!-- #3 Cocomelon -->
    <div class="card">
      <div class="card-header">
        <div class="rank-badge bronze">#3</div>
        <span class="card-label">Live counter</span>
      </div>
      <iframe loading="lazy" frameborder="0"
        src="https://livecounts.io/embed/youtube-live-subscriber-counter/UCbCmjCuTUZos6Inko4u57UQ"></iframe>
    </div>

    <!-- #4 SET India -->
    <div class="card">
      <div class="card-header">
        <div class="rank-badge">#4</div>
        <span class="card-label">Live counter</span>
      </div>
      <iframe loading="lazy" frameborder="0"
        src="https://livecounts.io/embed/youtube-live-subscriber-counter/UCpEhnqL0y41EpW2TvWAHD7Q"></iframe>
    </div>

    <!-- #5 Vlad and Niki -->
    <div class="card">
      <div class="card-header">
        <div class="rank-badge">#5</div>
        <span class="card-label">Live counter</span>
      </div>
      <iframe loading="lazy" frameborder="0"
        src="https://livecounts.io/embed/youtube-live-subscriber-counter/UCvlE5gTbOvjiolFlEm-c_Ow"></iframe>
    </div>

    <!-- #6 Empty slot -->
    <div class="empty-slot">
      <div class="empty-rank">#6</div>
      <h3>✨ Your Channel Could Be Here!</h3>
      <p>Subscribe 👍 Like ❤️ Comment 💬</p>
    </div>

    <!-- CTA Banner -->
    <div class="cta-card">
      <h2>🔥 Want to See Your Channel Here?</h2>
      <p>✅ Subscribe 👍 | ❤️ Like | 💬 Comment ✍️</p>
      <p class="sub-text">Do this during the live &amp; I'll add your channel here!</p>
      <div class="btn-row">
        <button class="btn btn-sub">🔴 Subscribe</button>
        <button class="btn btn-like">👍 Like</button>
        <button class="btn btn-cmt">💬 Comment</button>
      </div>
    </div>

  </div>
</body>
</html>
