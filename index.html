<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Top Creators</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

      <div class="bg-white rounded-2xl shadow-lg p-5">
        <div class="flex items-center gap-3 mb-3">
          <div class="w-10 h-10 rounded-full bg-gray-900 text-white flex items-center justify-center text-sm font-bold">#1</div>
          <span class="text-gray-500 text-sm">Live counter</span>
        </div>
        <iframe class="w-full h-[80px] rounded-lg border border-gray-200 shadow-sm"
          loading="lazy" frameborder="0"
          src="https://livecounts.io/embed/youtube-live-subscriber-counter/UCX6OQ3DkcsbYNE6H8uQQuVA"></iframe>
      </div>

      <!-- Card 2 -->
      <div class="bg-white rounded-2xl shadow-lg p-5">
        <div class="flex items-center gap-3 mb-3">
          <div class="w-10 h-10 rounded-full bg-gray-900 text-white flex items-center justify-center text-sm font-bold">#2</div>
          <span class="text-gray-500 text-sm">Live counter</span>
        </div>
        <iframe class="w-full h-[80px] rounded-lg border border-gray-200 shadow-sm"
          loading="lazy" frameborder="0"
          src="https://livecounts.io/embed/youtube-live-subscriber-counter/UCq-Fj5jknLsUf-MWSy4_brA"></iframe>
      </div>

      <!-- Card 3 -->
      <div class="bg-white rounded-2xl shadow-lg p-5">

          <span class="text-gray-500 text-sm">Live counter</span>
        </div>
        <iframe class="w-full h-[80px] rounded-lg border border-gray-200 shadow-sm"
          loading="lazy" frameborder="0"
          src="https://livecounts.io/embed/youtube-live-subscriber-counter/UCbCmjCuTUZos6Inko4u57UQ"></iframe>
      </div>

      <!-- Card 4 -->
      <div class="bg-white rounded-2xl shadow-lg p-5">
        <div class="flex items-center gap-3 mb-3">
          <div class="w-10 h-10 rounded-full bg-gray-900 text-white flex items-center justify-center text-sm font-bold">#4</div>
          <span class="text-gray-500 text-sm">Live counter</span>
        </div>
        <iframe class="w-full h-[80px] rounded-lg border border-gray-200 shadow-sm"
          loading="lazy" frameborder="0"
          src="https://livecounts.io/embed/youtube-live-subscriber-counter/UCpEhnqL0y41EpW2TvWAHD7Q"></iframe>
      </div>

      <!-- Card 5 -->
      <div class="bg-white rounded-2xl shadow-lg p-5">

          <span class="text-gray-500 text-sm">Live counter</span>

        <iframe class="w-full h-[80px] rounded-lg border border-gray-200 shadow-sm"

          src="https://livecounts.io/embed/youtube-live-subscriber-counter/UCvlE5gTbOvjiolFlEm-c_Ow"></iframe>
      </div>

      <!-- Empty Slot for Future Creator -->
      <div class="border-2 border-dashed border-gray-400 rounded-2xl flex flex-col items-center justify-center p-6 text-center bg-gray-50 hover:bg-gray-100 transition">
        <div class="w-10 h-10 rounded-full bg-gray-300 text-gray-700 flex items-center justify-center text-sm font-bold mb-3">#6</div>
        <h3 class="text-lg font-semibold text-gray-700">✨ Your Channel Could Be Here!</h3>
        <p class="text-sm text-gray-500 mt-1">Subscribe 👍 Like ❤️ Comment 💬</p>
      </div>

      <!-- Add Your Channel Card (Fake Buttons) -->
      <div class="bg-gradient-to-r from-red-500 to-pink-600 rounded-2xl shadow-lg p-6 text-center text-white col-span-1 sm:col-span-2 lg:col-span-3 animate-pulse">
        <h2 class="text-2xl font-bold mb-3">🔥 Want to See Your Channel Here?</h2>
        <p class="text-lg">✅ Subscribe 👍 | ❤️ Like | 💬 Comment ✍️</p>
        <p class="mt-2">Do this during the live & I’ll add your channel here!</p>

        <!-- Fake Buttons -->
        <div class="mt-4 flex items-center justify-center gap-3 flex-wrap">
          <button class="bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-5 rounded-full flex items-center gap-2 shadow-lg">
            🔴 Subscribe
          </button>
          <button class="bg-gray-200 hover:bg-gray-300 text-gray-900 font-semibold py-2 px-5 rounded-full flex items-center gap-2 shadow">
            👍 Like
          </button>
          <button class="bg-gray-200 hover:bg-gray-300 text-gray-900 font-semibold py-2 px-5 rounded-full flex items-center gap-2 shadow">
            💬 Comment
